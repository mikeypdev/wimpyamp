name: CI/Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Run quality checks via Makefile
      run: |
        make setup
        make check

  build:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: x86_64
          - os: windows-latest
            arch: x86_64
          - os: ubuntu-latest
            arch: x86_64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Create distribution (non-macOS or non-tagged)
      if: matrix.os != 'macos-latest' && matrix.os != 'macos-15-intel'
      run: |
        make setup
        ARCH=${{ matrix.arch }} make dist-archive

    - name: Check entitlements file exists
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
      run: |
        if [ ! -f "macos.entitlements" ]; then
          echo "ERROR: macos.entitlements not found in repository"
          exit 1
        fi
        echo "✅ macos.entitlements found"

    - name: Import Code Signing Certificate
      if: startsWith(github.ref, 'refs/tags/v') && (matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel')
      run: |
        # Create temporary keychain
        KEYCHAIN_PATH="/Users/runner/work/_temp/app-signing.keychain-db"
        security create-keychain -p "" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "" $KEYCHAIN_PATH

        # Import certificate and private key
        echo "$APPLE_SIGNING_CERTIFICATE_P12_BASE64" | base64 --decode -o certificate.p12
        security import certificate.p12 -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH

        # Set keychain as default
        security default-keychain -d user -s $KEYCHAIN_PATH

        # Verify certificate is available
        security find-identity -v -p codesigning
        echo "✅ Certificate imported successfully"
      env:
        APPLE_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12_BASE64 }}
        APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}

    - name: Create signed and notarized distribution (tags only)
      if: startsWith(github.ref, 'refs/tags/v') && (matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel')
      run: |
        make setup
        ARCH=${{ matrix.arch }} make dist-archive NOTARIZE=true
      env:
        APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      timeout-minutes: 30

    - name: Cleanup Keychain
      if: always() && startsWith(github.ref, 'refs/tags/v') && (matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel')
      run: |
        KEYCHAIN_PATH="/Users/runner/work/_temp/app-signing.keychain-db"
        security delete-keychain $KEYCHAIN_PATH || true
        echo "✅ Keychain cleaned up"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WimPyAmp-${{ matrix.os }}-${{ matrix.arch }}
        path: |
          dist/*.dmg
          dist/*.tar.gz
          dist/*.zip
        if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        draft: true
        files: artifacts/*
        name: Release ${{ github.ref_name }}
        body: |
          Automated release for version ${{ github.ref_name }}.

          This release contains builds for macOS (ARM64 & x86_64), Windows (x86_64), and Linux (x86_64).
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
